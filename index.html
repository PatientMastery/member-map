.leaflet-popup-tip { background: #072B5B; }

.popup-name { font-weight: 900; font-size: 0.92rem; color: #00BFC9; margin-bottom: 5px; }
.popup-address { font-size: 0.75rem; color: rgba(255,255,255,0.65); line-height: 1.55; margin-bottom: 6px; }

var map = L.map('map', { center: [30, -40], zoom: 2, minZoom: 2 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '\u00a9 <a href="https://carto.com/">CARTO</a> \u00a9 <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, subdomains: 'abcd', opacity: 0.55, pane: 'shadowPane'
}).addTo(map);

// Offset stacked pins so they appear side-by-side
var coordGroups = {};
members.forEach(function(m, i) {
  var key = m.lat.toFixed(5) + ',' + m.lon.toFixed(5);
  if (!coordGroups[key]) coordGroups[key] = [];
  coordGroups[key].push(i);
});
var memberCoords = members.map(function(m) { return [m.lat, m.lon]; });
Object.keys(coordGroups).forEach(function(key) {
  var group = coordGroups[key];
  if (group.length > 1) {
    var r = 0.0006;
    group.forEach(function(idx, j) {
      var angle = (2 * Math.PI * j / group.length) - Math.PI / 2;
      memberCoords[idx] = [
        members[idx].lat + r * Math.cos(angle),
        members[idx].lon + r * Math.sin(angle)
      ];
    });
  }
});

members.forEach(function(m, i) {
  var coords = memberCoords[i];
  var marker = L.circleMarker(coords, {
    radius: 8,
    fillColor: '#00BFC9',
    color: '#072B5B',
    weight: 2,
    opacity: 1,
    fillOpacity: 0.9
  }).addTo(map);

  marker.on('mouseover', function() {
    this.setStyle({ fillColor: '#fff', color: '#00BFC9', radius: 10 });
  });
  marker.on('mouseout', function() {
    this.setStyle({ fillColor: '#00BFC9', color: '#072B5B', radius: 8 });
  });

  var popupContent = '<div class="popup-name">' + m.name + '</div>' +
    '<div class="popup-address">' + m.address + '</div>';
  if (m.specialties) {
    popupContent += '<div class="popup-specialties">' + m.specialties + '</div>';
  }
  marker.bindPopup(popupContent, { maxWidth: 280 });
});
